name: Update races (manual)

# watchlist 廃止に伴い、固定リストの定時取得バッチは廃止した。
# 取得対象は手動 dispatch 時に race_ids 入力で都度指定する。
# data/race.db は gitignore のため PR ではなく artifact として出力する。
#
# 注: 「PCオフの土曜朝バッチ」を続けるなら、取得対象レースの決め方
#     （当日重賞の自動判定 等）を別途設計する必要がある（現状は手動指定）。

on:
  workflow_dispatch:
    inputs:
      race_ids:
        description: "取得する race_id（スペース区切り。keibalab 日付ベース 12桁 例: 202605030811）"
        required: true
        type: string

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init DB
        run: python scripts/db.py

      - name: Fetch specified races
        run: |
          python scripts/fetch_races.py ${{ inputs.race_ids }}
          python scripts/fetch_results.py ${{ inputs.race_ids }}

      - name: Upload populated DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: race-db
          path: data/race.db
          retention-days: 7
