name: Update races (manual)

# watchlist 廃止に伴い、固定リストの定時取得バッチは廃止した。
# 取得対象は手動 dispatch 時に race_ids 入力で都度指定する。
# data/race.db は gitignore のため、actions/cache で run 間で引き継いで増分蓄積し、
# 直近スナップショットを artifact としても出力する。
#
# 注: 「PCオフの土曜朝バッチ」を続けるなら、取得対象レースの決め方
#     （当日重賞の自動判定 等）を別途設計する必要がある（現状は手動指定）。

on:
  workflow_dispatch:
    inputs:
      race_ids:
        description: "取得する race_id（スペース区切り。keibalab 日付ベース 12桁 例: 202605030811）"
        required: true
        type: string

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      RACE_IDS: ${{ inputs.race_ids }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate race_ids (12桁数字のみ)
        run: |
          for id in $RACE_IDS; do
            if ! echo "$id" | grep -Eq '^[0-9]{12}$'; then
              echo "::error::不正な race_id: $id（12桁数字のみ）"
              exit 1
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore DB (増分蓄積)
        uses: actions/cache@v4
        with:
          path: data/race.db
          key: race-db-${{ github.run_id }}
          restore-keys: |
            race-db-

      - name: Init / migrate DB
        run: python scripts/db.py

      - name: Fetch specified races
        run: |
          # shellcheck disable=SC2086  # スペース区切りの複数 ID を意図的に展開（上で検証済み）
          python scripts/fetch_races.py $RACE_IDS
          python scripts/fetch_results.py $RACE_IDS

      - name: Upload populated DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: race-db
          path: data/race.db
          retention-days: 30
